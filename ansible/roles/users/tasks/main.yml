#     key: "{{ item.ssh_key }}"
#   loop: "{{ users }}"
#  when: item.ssh_key is defined

- name: Add several ssh key to user profile
  authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
  loop: "{{ users | subelements('ssh_keys', skip_missing=True) }}"
  when: item.0.ssh_keys is defined
