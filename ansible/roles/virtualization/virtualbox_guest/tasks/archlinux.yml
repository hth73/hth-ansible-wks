---
- name: Install VirtualBox guest utils (Arch)
  pacman:
    name: "{{ virtualbox_guest_packages }}"
    state: present
    update_cache: true

- name: Enable VBoxService
  systemd:
    name: vboxservice
    enabled: true
    state: started

- name: Ensure VBox modules loaded
  command: modprobe vboxvideo
  changed_when: false

- name: Install matching VirtualBox host modules (best effort)
  pacman:
    name: "{{ virtualbox_kernel_pkg }}"
    state: present
  when: virtualbox_kernel_pkg | length > 0
  ignore_errors: true
